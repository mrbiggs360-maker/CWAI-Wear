18px 4px;margin-bottom:12px}.header{position:fixed;top:0;left:0;right:0;min-height:50px;z-index:10;display:flex;flex-direction:column;justify-content:center;align-items:center;border-bottom:1px solid rgba(255,255,255,.05);padding:6px 0}.fab-container{position:fixed;bottom:15px;left:0;right:0;display:flex;justify-content:center;z-index:20;pointer-events:none}.fab{pointer-events:auto;background:linear-gradient(to bottom,#2563eb,#1d4ed8);color:#fff;border-radius:9999px;padding:10px 20px;font-weight:600;font-size:clamp(12px,3.5vw,14px);box-shadow:0 4px 15px rgba(37,99,235,.4);border:1px solid rgba(255,255,255,.1);transition:all .2s cubic-bezier(0.16,1,0.3,1);display:flex;align-items:center;gap:6px}.fab:active{transform:scale(0.95)}.modal-overlay{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;padding:15px;transition:all .3s cubic-bezier(0.16,1,0.3,1)}.modal-closed{opacity:0;pointer-events:none;transform:scale(0.95)}.modal-open{opacity:1;pointer-events:auto;transform:scale(1)}textarea{flex:1;background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:12px;font-size:clamp(14px,4.5vw,16px);resize:none;margin-bottom:10px;font-family:'Inter',sans-serif}textarea:focus{outline:0;border-color:#3b82f6;background:rgba(0,0,0,.8)}.session-item{background:rgba(31,41,55,.6);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:12px;margin-bottom:8px;text-align:left;font-size:clamp(12px,3.5vw,14px);color:#e5e7eb;transition:background .2s}.session-item:active{background:rgba(31,41,55,.9)}.session-active{border-color:rgba(59,130,246,.5);background:rgba(37,99,235,.15)}</style></head><body><div class="header glass"><div class="flex items-center gap-1.5 opacity-80 mb-1.5"><span class="w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.6)]"></span> <span class="text-[clamp(10px,3vw,12px)] font-bold tracking-wide text-gray-300">CWAI 1.1 WEAR</span></div><div class="flex items-center gap-6"><button id="sessions-btn" class="p-1 text-gray-400 hover:text-blue-400 transition-colors"><i class="ri-list-check text-[clamp(14px,4vw,16px)]"></i></button> <button id="clear-btn" class="p-1 text-gray-400 hover:text-red-400 transition-colors"><i class="ri-delete-bin-line text-[clamp(14px,4vw,16px)]"></i></button></div></div><div id="chat-container" class="wear-container no-scrollbar"></div><div class="fab-container"><button id="open-input-btn" class="fab"><i class="ri-add-line"></i> <span>Message</span></button></div><div id="input-modal" class="modal-overlay glass-heavy modal-closed"><div class="flex justify-between items-center mb-3 px-1"><div class="flex items-center gap-1.5"><i class="ri-pencil-fill text-blue-400 text-[clamp(10px,3vw,12px)]"></i> <span class="text-[clamp(9px,2.5vw,11px)] font-bold text-gray-400 tracking-wider uppercase">Compose</span></div><span id="draft-indicator" class="text-[clamp(8px,2.5vw,10px)] text-gray-600 font-mono opacity-0 transition-opacity">SAVED</span></div><textarea id="user-input" placeholder="Type request..." spellcheck="false"></textarea><div class="flex gap-2 h-11"><button id="cancel-btn" class="w-1/3 bg-gray-800/80 hover:bg-gray-700 border border-gray-700 text-gray-400 rounded-xl text-[clamp(11px,3vw,13px)] font-bold transition">Cancel</button> <button id="send-btn" class="w-2/3 bg-blue-600 hover:bg-blue-500 text-white border border-blue-400/20 rounded-xl text-[clamp(11px,3vw,13px)] font-bold shadow-lg shadow-blue-900/30 transition flex items-center justify-center gap-1">Send <i class="ri-send-plane-fill"></i></button></div></div><div id="sessions-modal" class="modal-overlay glass-heavy modal-closed"><div class="flex justify-between items-center mb-3 px-1"><div class="flex items-center gap-1.5"><i class="ri-history-line text-blue-400 text-[clamp(10px,3vw,12px)]"></i> <span class="text-[clamp(9px,2.5vw,11px)] font-bold text-gray-400 tracking-wider uppercase">Sessions</span></div><button id="close-sessions-btn" class="text-gray-400 p-1"><i class="ri-close-line text-lg"></i></button></div><div id="sessions-list" class="flex-1 overflow-y-auto no-scrollbar flex flex-col pt-1 pb-4"></div><div class="h-11 mt-auto"><button id="new-session-btn" class="w-full h-full bg-blue-600 hover:bg-blue-500 text-white border border-blue-400/20 rounded-xl text-[clamp(11px,3vw,13px)] font-bold shadow-lg shadow-blue-900/30 transition flex items-center justify-center gap-1"><i class="ri-add-circle-line"></i> New Session</button></div></div><script>let API_KEY=localStorage.getItem("wear_api_key");if(!API_KEY){API_KEY=prompt("Enter Gemini API Key:");if(API_KEY)localStorage.setItem("wear_api_key",API_KEY)}const API_URL="https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent";const chatContainer=document.getElementById("chat-container"),openInputBtn=document.getElementById("open-input-btn"),inputModal=document.getElementById("input-modal"),userInput=document.getElementById("user-input"),sendBtn=document.getElementById("send-btn"),cancelBtn=document.getElementById("cancel-btn"),clearBtn=document.getElementById("clear-btn"),draftIndicator=document.getElementById("draft-indicator"),sessionsBtn=document.getElementById("sessions-btn"),sessionsModal=document.getElementById("sessions-modal"),closeSessionsBtn=document.getElementById("close-sessions-btn"),sessionsList=document.getElementById("sessions-list"),newSessionBtn=document.getElementById("new-session-btn");let sessions=[],currentSessionId=null;window.addEventListener("load",()=>{const e=localStorage.getItem("wear_sessions"),t=localStorage.getItem("wear_current_session");if(e){sessions=JSON.parse(e)}if(sessions.length===0){createNewSession()}else{currentSessionId=t&&sessions.find(e=>e.id===t)?t:sessions[0].id;renderHistory()}const s=localStorage.getItem("wear_msg_draft");if(s)userInput.value=s});function saveSessions(){localStorage.setItem("wear_sessions",JSON.stringify(sessions));localStorage.setItem("wear_current_session",currentSessionId)}function createNewSession(){const e="session_"+Date.now();sessions.unshift({id:e,title:"New Conversation",messages:[]});currentSessionId=e;saveSessions();renderHistory();toggleSessionsModal(false);appendBubble("ai","Online. Gemini 3.1 Flash Lite Preview ready.",false)}function getCurrentSession(){return sessions.find(e=>e.id===currentSessionId)}function updateSessionTitle(e){const t=getCurrentSession();if(t&&t.messages.length===1){t.title=e.length>25?e.substring(0,25)+"...":e;saveSessions()}}userInput.addEventListener("input",()=>{localStorage.setItem("wear_msg_draft",userInput.value);draftIndicator.style.opacity="1";setTimeout(()=>draftIndicator.style.opacity="0",2e3)});function renderHistory(){chatContainer.innerHTML="";const e=getCurrentSession();if(e&&e.messages){e.messages.forEach(e=>{createBubbleElement(e.role,e.text,false)})}scrollToBottom()}function appendBubble(e,t,s=true){createBubbleElement(e,t,true);if(s){const s=getCurrentSession();if(s){s.messages.push({role:e,text:t});saveSessions()}}scrollToBottom()}function createBubbleElement(e,t,s=true){const n=document.createElement("div");n.className=`${e==="user"?"user-msg":"ai-msg"} bubble`;if(s)n.classList.add("animate-enter-message");else n.style.opacity="1";let o=t.replace(/\*\*(.*?)\*\*/g,'<b class="text-white font-semibold">$1</b>').replace(/`(.*?)`/g,'<code class="bg-gray-700/50 px-1 rounded text-xs font-mono">$1</code>');n.innerHTML=o;chatContainer.appendChild(n)}function scrollToBottom(){setTimeout(()=>{chatContainer.scrollTop=chatContainer.scrollHeight},50)}function toggleModal(e){if(e){inputModal.classList.remove("modal-closed");inputModal.classList.add("modal-open");openInputBtn.style.transform="translateY(100px)";setTimeout(()=>userInput.focus(),100)}else{inputModal.classList.remove("modal-open");inputModal.classList.add("modal-closed");openInputBtn.style.transform="translateY(0)";userInput.blur()}}function toggleSessionsModal(e){if(e){renderSessionsList();sessionsModal.classList.remove("modal-closed");sessionsModal.classList.add("modal-open");openInputBtn.style.transform="translateY(100px)"}else{sessionsModal.classList.remove("modal-open");sessionsModal.classList.add("modal-closed");openInputBtn.style.transform="translateY(0)"}}function renderSessionsList(){sessionsList.innerHTML="";sessions.forEach(e=>{const t=document.createElement("button");t.className=`session-item w-full truncate ${e.id===currentSessionId?"session-active":""}`;t.innerText=e.title;t.onclick=()=>{currentSessionId=e.id;saveSessions();renderHistory();toggleSessionsModal(false)};sessionsList.appendChild(t)})}openInputBtn.addEventListener("click",()=>toggleModal(true));cancelBtn.addEventListener("click",()=>toggleModal(false));sessionsBtn.addEventListener("click",()=>toggleSessionsModal(true));closeSessionsBtn.addEventListener("click",()=>toggleSessionsModal(false));newSessionBtn.addEventListener("click",createNewSession);clearBtn.addEventListener("click",()=>{if(confirm("Clear current conversation?")){const e=getCurrentSession();if(e){e.messages=[];saveSessions();chatContainer.innerHTML="";appendBubble("ai","Conversation cleared.",false)}}});function promptForApiKey(){const e=prompt("API Error. Please re-enter your Gemini API Key:");if(e){API_KEY=e;localStorage.setItem("wear_api_key",API_KEY)}}sendBtn.addEventListener("click",async()=>{const e=userInput.value.trim();if(!e)return;toggleModal(false);userInput.value="";localStorage.removeItem("wear_msg_draft");appendBubble("user",e);updateSessionTitle(e);const t="loading-"+Date.now();const s=document.createElement("div");s.id=t;s.className="ai-msg bubble animate-enter-message";s.innerHTML=`<div class="flex gap-1 py-1 px-1"><span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce"></span><span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></span><span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span></div>`;chatContainer.appendChild(s);scrollToBottom();try{const n=await fetch(`${API_URL}?key=${API_KEY}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:e}]}]})});const o=await n.json();const a=document.getElementById(t);if(a)a.remove();if(!n.ok||o.error){throw new Error(o.error?.message||"API Error")}if(o.candidates&&o.candidates[0].content.parts[0].text){appendBubble("ai",o.candidates[0].content.parts[0].text)}else{appendBubble("ai","Error: No text returned.")}}catch(e){const n=document.getElementById(t);if(n)n.remove();appendBubble("ai","Connection Failed or API Error.");setTimeout(promptForApiKey,500)}});if("serviceWorker"in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{})})}</script></body></html>
